server:
  port: 8088

app:
  base-url: http://localhost:8088

spring:
  mongodb:
    uri: mongodb://polychain-user:polychain-password@localhost:27017/polychain-bets?authSource=admin

mongodb:
  database: polychain-auth
  ssl:
    enabled: false
    cert: global-bundle.pem

internal:
  secret: ${INTERNAL_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: videos
  expiry-hours: 2

video:
  token:
    secret: ${VIDEO_TOKEN_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLXZpZGVvLXRva2Vucy0xMjM=}
    expiry-seconds: 3600

platform:
  margin: ${PLATFORM_MARGIN:0.05}

spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5413/polychain-finance
    username: polychain-finance-user
    password: polychain-finance-password
  flyway:
    url: jdbc:postgresql://localhost:5413/polychain-finance
    user: polychain-finance-user
    password: polychain-finance-password
    locations: classpath:db/migration