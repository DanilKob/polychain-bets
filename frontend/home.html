<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home · Polychain Bets</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/style.css"/>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .home-layout {
      position: relative; z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header — fixed, floats over the feed ── */
    .home-header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(10,10,15,.85) 60%, transparent);
      pointer-events: none;
    }
    .home-header > * { pointer-events: auto; }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px 6px 6px;
    }
    .user-pill-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      display: none;
    }
    .user-pill-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .sign-out-btn {
      background: var(--red-dim);
      border: 1px solid rgba(255,79,106,.25);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--red);
      cursor: pointer;
      transition: all .15s;
    }
    .sign-out-btn:hover { background: rgba(255,79,106,.2); }

    /* ── Section label ── */
    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    /* ── Feed ── */
    #feedList {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Each card = one full screen, snaps into place on scroll */
    .wager-card {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      scroll-snap-align: start;
      background: #000;
      cursor: pointer;
    }

    /* Video fills the entire card */
    .wager-video-box {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .wager-video-box video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* full video visible, black fills letterbox/pillarbox */
      background: #000;
      display: block;
    }

    .video-mute-badge {
      position: absolute;
      bottom: 14px; right: 14px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,.7);
      letter-spacing: .04em;
      pointer-events: none;
    }

    .wager-thumbnail-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 11px;
      color: var(--text-dim); letter-spacing: .05em;
    }

    /* Overlay at bottom — gradient scrim + info */
    .wager-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 1;
      padding: 80px 20px 32px;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.75) 50%, rgba(0,0,0,.92) 100%);
    }

    .wager-name {
      font-size: 17px; font-weight: 600;
      color: #fff; margin-bottom: 6px; line-height: 1.3;
    }

    .wager-text {
      font-size: 13px; color: rgba(255,255,255,.7);
      line-height: 1.5; margin-bottom: 14px;
    }

    .wager-outcomes {
      display: flex; flex-wrap: wrap;
      gap: 8px; margin-bottom: 12px;
    }

    .outcome-chip {
      background: rgba(79,110,247,.25);
      border: 1px solid rgba(79,110,247,.4);
      border-radius: 20px; padding: 5px 14px;
      font-family: var(--mono); font-size: 12px; color: #fff;
      cursor: pointer; transition: background .15s;
    }
    .outcome-chip:hover { background: rgba(79,110,247,.45); }

    .wager-meta {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 11px;
      color: rgba(255,255,255,.4);
    }
    .wager-meta-dot { color: rgba(255,255,255,.2); }

    /* ── Load more sentinel ── */
    #feedSentinel {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feed-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .feed-spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .feed-end-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .05em;
      text-transform: uppercase;
      display: none;
    }
    .feed-end-msg.visible { display: block; }

    .feed-empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      display: none;
    }
    .feed-empty.visible { display: block; }
  </style>
</head>
<body>

<div class="home-layout">

  <div class="home-header">
    <div class="badge">Polychain Bets</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="user-pill">
        <img id="userAvatar" class="user-pill-avatar" alt=""/>
        <span class="user-pill-name" id="userName">...</span>
      </div>
      <button class="sign-out-btn" id="btnSignOut">Sign out</button>
    </div>
  </div>

  <div id="feedList"></div>
  <div class="feed-empty" id="feedEmpty">No wagers found</div>

  <div id="feedSentinel">
    <div class="feed-spinner" id="feedSpinner"></div>
    <div class="feed-end-msg" id="feedEndMsg">— end of feed —</div>
  </div>

</div>

<script type="module" src="/src/home.ts"></script>
</body>
</html>
